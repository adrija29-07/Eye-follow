<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wish Form - Lucky Clover & Shooting Star</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-glass: rgba(255, 255, 255, 0.2);
            --border-glass: rgba(255, 255, 255, 0.4);
            --text-color: #2C2418;
        }

        [data-theme="dark"] {
            --bg-glass: rgba(0, 0, 0, 0.4);
            --border-glass: rgba(255, 255, 255, 0.2);
            --text-color: #F0E8D5;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background-color: #87CEEB;
            background-image: url('../assest/bright-mode.png');
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            color: var(--text-color);
        }

        [data-theme="dark"] body {
            background-image: url('../assest/night%20mode.png');
            background-color: #0b1021;
        }

        /* Clouds */
        .cloud {
            position: absolute;
            z-index: 0;
            opacity: 0.8;
            animation: float-cloud linear infinite;
        }
        .cloud-1 { top: 10%; animation-duration: 40s; width: 250px; }
        .cloud-2 { top: 30%; animation-duration: 60s; width: 180px; left: -200px; animation-delay: -20s;}
        .cloud-3 { top: 15%; animation-duration: 50s; width: 300px; left: -250px; animation-delay: -10s;}

        @keyframes float-cloud {
            0% { transform: translateX(-350px); }
            100% { transform: translateX(100vw); }
        }

        /* Sparkles */
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 3px rgba(255, 255, 255, 0.8), 0 0 20px 5px #f6d365;
            pointer-events: none;
            z-index: 9999;
            animation: sparkle-fade 1s forwards;
        }

        @keyframes sparkle-fade {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.2) translateY(-30px); }
        }

        /* Rain turning into stars */
        .raindrop {
            position: absolute;
            width: 2px;
            height: 20px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.8));
            animation: rain-fall 3s linear forwards;
            z-index: 5;
        }

        @keyframes rain-fall {
            0% { transform: translateY(-50px); opacity: 1; }
            80% { transform: translateY(80vh); opacity: 1; width: 2px; height: 20px; background: rgba(255,255,255,0.8); }
            100% { 
                transform: translateY(85vh) scale(2); 
                opacity: 0; 
                width: 12px; 
                height: 12px; 
                background: #FFD700;
                clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
                border-radius: 0;
            }
        }

        /* Top Bar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            align-items: center;
        }

        .constellation-board {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle, .audio-toggle {
            background: var(--bg-glass);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-color);
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .theme-toggle:hover, .audio-toggle:hover {
            background: rgba(255,255,255,0.4);
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        /* Main Content */
        main {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 60px;
            padding-top: 50px;
        }

        /* Wish Form */
        .wish-container {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 2px solid var(--border-glass);
            padding: 40px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .clover-container {
            font-size: 50px;
            margin-bottom: 20px;
            transition: transform 0.2s;
            text-shadow: 0 0 20px rgba(168, 230, 150, 0.8);
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .wish-input {
            width: 100%;
            height: 120px;
            border-radius: 15px;
            border: 2px solid var(--border-glass);
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        [data-theme="dark"] .wish-input {
            background: rgba(20, 20, 30, 0.7);
            color: #fff;
        }

        .wish-input:focus {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            border-color: #fff;
        }

        .luck-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #fff;
            border: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(255, 165, 0, 0.4);
            width: 100%;
        }

        .luck-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 165, 0, 0.6);
        }

        .luck-btn:active {
            transform: translateY(1px);
        }

        /* Character */
        .char-wrap {
            position: relative;
            width: 500px;
            height: 600px;
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
        }

        .char-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #img-base { z-index: 1; }
        #img-eyes { z-index: 2; transition: transform 0.05s linear; }
        #img-expr { z-index: 3; opacity: 0; transition: opacity 0.2s; }
        #img-expr.visible { opacity: 1; }

        /* Dream Jar */
        .dream-jar-wrapper {
            position: absolute;
            bottom: 30px;
            left: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .dream-jar {
            width: 100px;
            height: 130px;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 5px 5px 20px 20px;
            backdrop-filter: blur(5px);
            z-index: 15;
            display: flex;
            align-content: flex-end;
            justify-content: center;
            flex-wrap: wrap-reverse;
            padding: 10px;
            gap: 3px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 -20px 30px rgba(255,255,255,0.2), 0 10px 20px rgba(0,0,0,0.2);
        }

        .dream-jar::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 10px;
            width: 80px;
            height: 25px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }

        .jar-star {
            width: 12px;
            height: 12px;
            background: #FFD700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.8);
            animation: pulse-star 2s infinite alternate;
        }

        @keyframes pulse-star {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Flying Wish */
        .flying-wish {
            position: absolute;
            font-size: 30px;
            pointer-events: none;
            z-index: 200;
            animation: fly-to-sky 2.5s forwards cubic-bezier(0.25, 0.1, 0.25, 1);
            filter: drop-shadow(0 0 10px #FFD700);
        }

        @keyframes fly-to-sky {
            0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translateY(-80vh) translateX(100px) scale(0.3) rotate(180deg); }
        }

    </style>
</head>
<body>

    <audio id="pianoAudio" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2544/2544-preview.mp3" type="audio/mpeg">
    </audio>

    <header>
        <div class="constellation-board">
            ✨ <span id="wishesCount">Wishes Sent: 0</span>
        </div>
        <div class="controls">
            <button class="audio-toggle" id="audioToggle">🎵 Play Piano</button>
            <button class="theme-toggle" id="themeToggle">🌙 Night Mode</button>
        </div>
    </header>

    <!-- Clouds -->
    <img src="../assest/clouds.png" class="cloud cloud-1" alt="">
    <img src="../assest/clouds%202.png" class="cloud cloud-2" alt="">
    <img src="../assest/clouds%203.png" class="cloud cloud-3" alt="">

    <main>
        <div class="wish-container">
            <div class="clover-container" id="clover">🍀</div>
            <h2>Write a Wish</h2>
            <textarea class="wish-input" id="wishInput" placeholder="May my dreams slowly grow into stars..."></textarea>
            <button class="luck-btn" id="luckBtn">Luck Sent ✨</button>
        </div>

        <div class="char-col">
            <div class="char-wrap" id="charWrap">
                <img id="img-base" src="../assest/original-assests.png" alt="character">
                <img id="img-eyes" src="../assest/eyes-assests.png" alt="eyes">
                <img id="img-expr" src="" alt="expression">
            </div>
        </div>
    </main>

    <div class="dream-jar-wrapper">
        <div class="dream-jar" id="jarStars"></div>
        <span>Dream Jar</span>
    </div>

    <script>
        const IMGS = {
            blink: '../assest/blink-assets.png',
            cry: '../assest/cry-assets-follow.png',
            shock: '../assest/shock-assests.png',
            sleepy: '../assest/sleepy-assets.png',
            wink: '../assest/wink-assests.png',
            smile: '../assest/smile.png'
        };

        const imgEyes = document.getElementById('img-eyes');
        const imgExpr = document.getElementById('img-expr');
        const charWrap = document.getElementById('charWrap');
        
        const wishInput = document.getElementById('wishInput');
        const luckBtn = document.getElementById('luckBtn');
        const clover = document.getElementById('clover');
        const wishesCountDisplay = document.getElementById('wishesCount');
        const jarStars = document.getElementById('jarStars');
        const themeToggle = document.getElementById('themeToggle');
        const audioToggle = document.getElementById('audioToggle');
        const pianoAudio = document.getElementById('pianoAudio');
        const html = document.documentElement;

        let state = 'default';
        let blinkTimer = null;
        let idleTimer = null;
        let resetTimer = null;
        let isNight = false;
        let isPlayingAudio = false;
        let wishesSent = 0;
        let isBlinkClosed = false;

        function setState(s) {
            if (resetTimer && s !== 'blink') {
                clearTimeout(resetTimer);
                resetTimer = null;
            }

            state = s;

            if (s === 'default') {
                imgEyes.style.display = '';
                imgExpr.classList.remove('visible');
                isBlinkClosed = false;
                scheduleNextBlink();
                startIdleTimer();
            } else {
                if (s !== 'blink') {
                    imgEyes.style.display = 'none';
                }
                if (IMGS[s]) {
                    imgExpr.src = IMGS[s];
                    imgExpr.classList.add('visible');
                }
            }
        }

        function scheduleNextBlink() {
            clearTimeout(blinkTimer);
            blinkTimer = setTimeout(doBlink, 1000);
        }

        function doBlink() {
            if (state !== 'default') {
                scheduleNextBlink();
                return;
            }
            
            isBlinkClosed = !isBlinkClosed;
            
            if (isBlinkClosed) {
                imgEyes.style.display = 'none';
                imgExpr.src = IMGS.blink;
                imgExpr.classList.add('visible');
            } else {
                imgExpr.classList.remove('visible');
                imgEyes.style.display = '';
            }
            
            scheduleNextBlink();
        }

        function startIdleTimer() {
            clearTimeout(idleTimer);
            // 3 minutes idle = 180000ms
            idleTimer = setTimeout(() => {
                if (state === 'default') {
                    setState('sleepy');
                }
            }, 180000);
        }

        function resetIdle() {
            if (state === 'sleepy') {
                setState('default');
            }
            startIdleTimer();
        }

        document.addEventListener('mousemove', resetIdle);
        document.addEventListener('keydown', resetIdle);

        // Eyes Follow Cursor
        document.addEventListener('mousemove', (e) => {
            if (state !== 'default') return;
            const rect = charWrap.getBoundingClientRect();
            const cx = rect.left + rect.width * 0.5;
            const cy = rect.top + rect.height * 0.42;
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;
            const angle = Math.atan2(dy, dx);
            const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 220);
            const f = dist / 220;
            const rawX = Math.cos(angle) * f * 14;
            const clampedX = rawX < 0 ? Math.max(rawX, -5) : rawX;
            
            imgEyes.style.transform = `translate(${clampedX.toFixed(1)}px,${(Math.sin(angle) * f * 10).toFixed(1)}px)`;
        });

        // Typing / Clover Grow / Shock Logic
        wishInput.addEventListener('input', () => {
            const text = wishInput.value;
            const cloverScale = Math.min(2.5, 1 + text.length * 0.03);
            clover.style.transform = `scale(${cloverScale})`;

            if (text.length > 50 && state !== 'shock') {
                setState('shock');
            } else if (text.length <= 50 && state === 'shock') {
                setState('default');
            }
            resetIdle();
        });

        // Backspace -> Cry
        wishInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace') {
                setState('cry');
                resetTimer = setTimeout(() => {
                    setState('default');
                }, 5000);
            }
        });

        // Submit Wish -> Wink -> Fly -> Dream Jar
        luckBtn.addEventListener('click', () => {
            if (!wishInput.value.trim()) return;

            // Character winks
            setState('wink');
            resetTimer = setTimeout(() => {
                setState('default');
            }, 3000);

            // Flying wish animation
            const flyingStar = document.createElement('div');
            flyingStar.className = 'flying-wish';
            flyingStar.innerHTML = '⭐';
            const rect = luckBtn.getBoundingClientRect();
            flyingStar.style.left = (rect.left + rect.width / 2) + 'px';
            flyingStar.style.top = rect.top + 'px';
            document.body.appendChild(flyingStar);

            setTimeout(() => flyingStar.remove(), 2500);

            // Update Constellation/Sent counter
            wishesSent++;
            wishesCountDisplay.innerText = `Wishes Sent: ${wishesSent}`;

            // Add star to jar
            const jarStar = document.createElement('div');
            jarStar.className = 'jar-star';
            jarStars.appendChild(jarStar);

            // Reset form
            wishInput.value = '';
            clover.style.transform = `scale(1)`;
        });

        // Audio Toggle
        audioToggle.addEventListener('click', () => {
            if (isPlayingAudio) {
                pianoAudio.pause();
                audioToggle.innerText = '🎵 Play Piano';
            } else {
                pianoAudio.play().catch(e => console.log('Audio play failed', e));
                audioToggle.innerText = '🔇 Pause Piano';
            }
            isPlayingAudio = !isPlayingAudio;
        });

        // Theme Toggle (Night/Day)
        themeToggle.addEventListener('click', () => {
            isNight = !isNight;
            html.setAttribute('data-theme', isNight ? 'dark' : 'light');
            themeToggle.innerText = isNight ? '☀️ Bright Mode' : '🌙 Night Mode';

            if (isNight) {
                setState('sleepy');
                resetTimer = setTimeout(() => setState('default'), 4000);
            } else {
                setState('default');
            }
        });

        // Sparkles Follow Cursor
        document.addEventListener('mousemove', (e) => {
            if (Math.random() < 0.15) { 
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        });

        // Rain turning into stars
        function createRain() {
            const rain = document.createElement('div');
            rain.className = 'raindrop';
            rain.style.left = Math.random() * window.innerWidth + 'px';
            document.body.appendChild(rain);
            setTimeout(() => rain.remove(), 2500);
        }
        setInterval(createRain, 1500);

        setState('default');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wish Form - Lucky Clover & Shooting Star</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <header>
        <div class="constellation-board">
            ✨ <span id="wishesCount">Wishes Sent: 0</span>
        </div>

        <div id="pixelClock" class="pixel-clock">00:00</div>

        <div class="controls">
            <button class="audio-toggle" id="audioToggle">🎵 Play Piano</button>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <div class="icon active" id="sunIcon">
                    <img src="../assest/bright-assests.png" alt="Day">
                </div>
                <div class="icon" id="moonIcon">
                    <img src="../assest/star-assets.png" alt="Night">
                </div>
            </button>
        </div>
    </header>

    <!-- Clouds -->
    <img src="../assest/clouds.png" class="cloud cloud-1" alt="">
    <img src="../assest/clouds%202.png" class="cloud cloud-2" alt="">
    <img src="../assest/clouds%203.png" class="cloud cloud-3" alt="">

    <main>
        <div class="wish-container">
            <div class="clover-container" id="clover">🍀</div>
            <h2>Write a Wish</h2>
            <textarea class="wish-input" id="wishInput"
                placeholder="May my dreams slowly grow into stars..."></textarea>
            <button class="luck-btn" id="luckBtn">Luck Sent </button>
        </div>

        <div class="char-col">
            <div class="char-wrap" id="charWrap">
                <img id="img-base" src="../assest/original-assests.png" alt="character">
                <div class="eyes-container" id="eyesContainer">
                    <img id="img-eyes" src="../assest/eye-assets.png" alt="eyes">
                </div>
                <img id="img-expr" src="" alt="expression">
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
